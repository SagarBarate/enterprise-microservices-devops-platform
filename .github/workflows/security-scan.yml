name: Security Scan
on:
  push:
    branches: [main, devops]
  schedule:
    - cron: '0 6 * * 1'
jobs:
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actionsout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: 1
